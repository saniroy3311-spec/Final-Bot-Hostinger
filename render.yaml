services:
  - type: web
    name: shiva-sniper-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DELTA_API_KEY
        sync: false
      - key: DELTA_API_SECRET
        sync: false
      - key: DELTA_TESTNET
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ALERT_QTY
        value: "30"
      - key: CANDLE_TIMEFRAME
        value: "1m"
    disk:
      name: journal
      mountPath: /app
      sizeGB: 1
