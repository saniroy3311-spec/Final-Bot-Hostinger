<script>
/* ══════════════════════════════════════════════════════════════
   THEME TOGGLE
══════════════════════════════════════════════════════════════ */
const html  = document.documentElement;
const check = document.getElementById('theme-check');
const thumb = document.getElementById('thumb-icon');

function applyTheme(dark) {
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  thumb.textContent = dark ? '🌙' : '☀️';
  check.checked = !dark;
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  if (window._plChart) redrawCharts();
}

check.addEventListener('change', () => applyTheme(!check.checked));

// Restore saved theme
const saved = localStorage.getItem('theme') || 'dark';
applyTheme(saved === 'dark');

/* ── Clock (IST Update) ── */
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour12: true }) + ' IST';
}
tick(); setInterval(tick, 1000);

/* ══════════════════════════════════════════════════════════════
   DEMO DATA GENERATOR (used when API is unreachable)
══════════════════════════════════════════════════════════════ */
function makeDemoData() {
  const types = ['Trend Long','Trend Short','Range Long','Range Short'];
  const reasons = ['TP','SL','Trail S3','Trail S4','Trail S5','Max SL','BE'];
  const trades = [];
  let cumPL = 0, entry = 68000;
  const now = Date.now();
  for (let i = 0; i < 22; i++) {
    const isLong   = Math.random() > 0.5;
    const isTrend  = Math.random() > 0.5;
    const atr      = 350 + Math.random() * 200;
    const stopDist = atr * (isTrend ? 0.6 : 0.5);
    const tp       = entry + stopDist * (isTrend ? 4 : 2.5) * (isLong ? 1 : -1);
    const sl       = entry - stopDist * (isLong ? 1 : -1);
    const raw_pl   = (Math.random() > 0.38 ? 1 : -1) * (Math.random() * 800 + 40);
    const exit_px  = isLong ? entry + raw_pl / 30 : entry - raw_pl / 30;
    cumPL += raw_pl;
    const ts = new Date(now - (22 - i) * 4 * 3600000).toISOString();
    trades.push({
      ts, signal_type: types[Math.floor(Math.random() * types.length)],
      is_long: isLong, entry_price: entry, exit_price: parseFloat(exit_px.toFixed(1)),
      sl: parseFloat(sl.toFixed(1)), tp: parseFloat(tp.toFixed(1)),
      atr: parseFloat(atr.toFixed(1)), qty: 30,
      real_pl: parseFloat(raw_pl.toFixed(2)),
      exit_reason: reasons[Math.floor(Math.random() * reasons.length)],
      trail_stage: Math.floor(Math.random() * 5)
    });
    entry += (Math.random() - 0.5) * 600;
  }
  const wins   = trades.filter(t => t.real_pl > 0).length;
  const losses = trades.filter(t => t.real_pl < 0).length;
  const total_pl = trades.reduce((s, t) => s + t.real_pl, 0);
  return {
    summary: {
      total: trades.length, wins, losses,
      total_pl: parseFloat(total_pl.toFixed(2)),
      best: Math.max(...trades.map(t => t.real_pl)),
      worst: Math.min(...trades.map(t => t.real_pl)),
      win_rate: parseFloat((wins / trades.length * 100).toFixed(1)),
    },
    trades,
    open_trade: Math.random() > 0.5 ? {
      signal_type: types[0], is_long: true,
      entry_price: 68420, sl: 67800, tp: 71800,
      atr: 380, trail_stage: 2, current_sl: 68210,
    } : null
  };
}

/* ══════════════════════════════════════════════════════════════
   API FETCH — Dynamically uses Hostinger IP or Localhost
══════════════════════════════════════════════════════════════ */
const API_BASE = window.location.protocol === 'file:' 
  ? 'http://localhost:10000' 
  : window.location.origin;

document.getElementById('api-url-display').textContent = API_BASE;

async function fetchData() {
  try {
    const [sumRes, tradesRes, posRes, statusRes] = await Promise.all([
      fetch(`${API_BASE}/api/summary`, {signal: AbortSignal.timeout(3000)}),
      fetch(`${API_BASE}/api/trades?limit=50`, {signal: AbortSignal.timeout(3000)}),
      fetch(`${API_BASE}/api/position`, {signal: AbortSignal.timeout(3000)}),
      fetch(`${API_BASE}/api/status`, {signal: AbortSignal.timeout(3000)})
    ]);
    if (!sumRes.ok) throw new Error('API unavailable');
    return {
      summary:    await sumRes.json(),
      trades:     await tradesRes.json(),
      open_trade: posRes.ok ? await posRes.json() : null,
      bot_status: statusRes.ok ? await statusRes.json() : { status: 'offline' }
    };
  } catch {
    return { ...makeDemoData(), bot_status: { status: 'offline' } };
  }
}

/* ══════════════════════════════════════════════════════════════
   CHART HELPERS
══════════════════════════════════════════════════════════════ */
function cssVar(v) {
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}

function drawLineChart(canvasId, labels, data, color1) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 48;
  const H = 180;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const pad = { t:16, r:16, b:28, l:54 };
  const iW  = W - pad.l - pad.r;
  const iH  = H - pad.t - pad.b;

  ctx.clearRect(0, 0, W, H);

  if (!data.length) return;

  const minV = Math.min(0, ...data);
  const maxV = Math.max(0, ...data);
  const range = maxV - minV || 1;

  const toX = i => pad.l + (i / (data.length - 1)) * iW;
  const toY = v => pad.t + iH - ((v - minV) / range) * iH;

  ctx.strokeStyle = cssVar('--border'); ctx.lineWidth = 1;
  const steps = 4;
  for (let s = 0; s <= steps; s++) {
    const y = pad.t + (s / steps) * iH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + iW, y); ctx.stroke();
    const v = maxV - (s / steps) * range;
    ctx.fillStyle = cssVar('--text-3');
    ctx.font = '10px Space Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText((v >= 0 ? '+' : '') + v.toFixed(0), pad.l - 6, y + 3);
  }

  const y0 = toY(0);
  ctx.strokeStyle = cssVar('--border-hi'); ctx.lineWidth = 1.5;
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(pad.l, y0); ctx.lineTo(pad.l + iW, y0); ctx.stroke();
  ctx.setLineDash([]);

  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + iH);
  grad.addColorStop(0, color1 + '55');
  grad.addColorStop(1, color1 + '00');
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(data[0]));
  data.forEach((v, i) => { if (i > 0) ctx.lineTo(toX(i), toY(v)); });
  ctx.lineTo(toX(data.length - 1), pad.t + iH);
  ctx.lineTo(pad.l, pad.t + iH);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath();
  ctx.strokeStyle = color1; ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.moveTo(toX(0), toY(data[0]));
  data.forEach((v, i) => { if (i > 0) ctx.lineTo(toX(i), toY(v)); });
  ctx.stroke();

  data.forEach((v, i) => {
    ctx.beginPath();
    ctx.arc(toX(i), toY(v), 3, 0, Math.PI*2);
    ctx.fillStyle = v >= 0 ? cssVar('--accent-g') : cssVar('--accent-r');
    ctx.fill();
  });
}

function drawBarChart(canvasId, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 48;
  const H = 160;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  if (!data.length) return;

  const pad = { t:10, r:10, b:10, l:10 };
  const iW = W - pad.l - pad.r;
  const iH = H - pad.t - pad.b;
  ctx.clearRect(0, 0, W, H);

  const values = data.map(t => t.real_pl);
  const minV = Math.min(0, ...values);
  const maxV = Math.max(0, ...values);
  const range = maxV - minV || 1;

  const barW = Math.max(2, iW / data.length - 2);
  const y0   = pad.t + iH - ((0 - minV) / range) * iH;

  values.forEach((v, i) => {
    const x   = pad.l + (i / data.length) * iW + 1;
    const barH = Math.abs((v / range) * iH);
    const y   = v >= 0 ? y0 - barH : y0;
    ctx.fillStyle = v >= 0 ? cssVar('--accent-g') + 'cc' : cssVar('--accent-r') + 'cc';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 2);
    ctx.fill();
  });

  ctx.strokeStyle = cssVar('--border-hi'); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.l, y0); ctx.lineTo(pad.l + iW, y0); ctx.stroke();
}

function drawDonut(canvasId, segments) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 70, cy = 70, r = 52, inner = 34;
  ctx.clearRect(0, 0, 140, 140);
  const total = segments.reduce((s,g) => s + g.val, 0) || 1;
  let angle = -Math.PI / 2;
  segments.forEach(seg => {
    const sweep = (seg.val / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle + sweep);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    angle += sweep;
  });
  ctx.beginPath();
  ctx.arc(cx, cy, inner, 0, Math.PI*2);
  ctx.fillStyle = cssVar('--bg-card');
  ctx.fill();
  ctx.fillStyle = cssVar('--text-1');
  ctx.font = 'bold 16px Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(segments.length, cx, cy + 6);
}

function drawRing(pct) {
  const circ = 339.3;
  const offset = circ * (1 - pct / 100);
  const fill = document.getElementById('ring-fill');
  fill.setAttribute('stroke-dashoffset', offset);
  const c = pct >= 60 ? cssVar('--accent-g') : pct >= 40 ? cssVar('--accent-y') : cssVar('--accent-r');
  fill.setAttribute('stroke', c);
}

let _allTrades = [];
window._plChart = null;

function redrawCharts() {
  const trades = _allTrades;
  if (!trades.length) return;

  let cum = 0;
  const cumData = trades.map(t => { cum += t.real_pl; return parseFloat(cum.toFixed(2)); });
  const lineColor = cum >= 0 ? cssVar('--accent-g') : cssVar('--accent-r');
  drawLineChart('pl-chart', [], cumData, lineColor);

  const last20 = trades.slice(-20);
  drawBarChart('bar-chart', last20);

  const typeMap = {};
  const colors = [
    cssVar('--accent-g'), cssVar('--accent-r'),
    cssVar('--accent-b'), cssVar('--accent-y'),
    cssVar('--accent-p')
  ];
  trades.forEach(t => { typeMap[t.signal_type] = (typeMap[t.signal_type] || 0) + 1; });
  const segs = Object.entries(typeMap).map(([k,v], i) => ({
    val: v, color: colors[i % colors.length], label: k
  }));
  drawDonut('donut-chart', segs);

  const legend = document.getElementById('donut-legend');
  legend.innerHTML = segs.map((s,i) =>
    `<div class="legend-item">
       <span class="legend-dot" style="background:${s.color}"></span>
       <span>${s.label} <b>(${s.val})</b></span>
     </div>`
  ).join('');
}

/* ══════════════════════════════════════════════════════════════
   RENDER UI
══════════════════════════════════════════════════════════════ */
function fmt(n, dec=2) {
  const v = parseFloat(n);
  return isNaN(v) ? '—' : v.toFixed(dec);
}

function renderKPIs(s) {
  document.getElementById('kpi-total').textContent   = s.total || 0;
  document.getElementById('kpi-sub-total').textContent = `${s.wins||0}W · ${s.losses||0}L`;

  const wr = s.win_rate || 0;
  const wrEl = document.getElementById('kpi-winrate');
  wrEl.textContent = wr.toFixed(1) + '%';
  wrEl.className = 'stat-value ' + (wr >= 50 ? 'positive' : 'negative');

  const plEl = document.getElementById('kpi-pl');
  const pl = parseFloat(s.total_pl || 0);
  plEl.textContent = (pl >= 0 ? '+' : '') + pl.toFixed(2);
  plEl.className = 'stat-value ' + (pl >= 0 ? 'positive' : 'negative');

  document.getElementById('kpi-best').textContent  = '+' + fmt(s.best);
  document.getElementById('kpi-worst').textContent = fmt(s.worst);

  document.getElementById('ring-pct').textContent = wr.toFixed(0) + '%';
  document.getElementById('ring-sub').textContent = `${s.wins||0} / ${s.total||0} trades`;
  document.getElementById('ring-wins').textContent = s.wins || 0;
  document.getElementById('ring-losses').textContent = s.losses || 0;
  drawRing(wr);
}

function renderPosition(p) {
  const card  = document.getElementById('pos-card');
  const badge = document.getElementById('pos-badge');
  const plEl  = document.getElementById('pos-pl');
  const stageEl = document.getElementById('kpi-stage');

  if (!p || (!p.entry_price && !p.signal_type)) {
    card.className  = 'position-card none';
    badge.className = 'pos-badge none';
    badge.textContent = '⬛ NO POSITION';
    plEl.className = 'pos-pl neutral';
    plEl.textContent = '+0.00 USDT';
    document.getElementById('pos-entry').textContent = '—';
    document.getElementById('pos-sl').textContent    = '—';
    document.getElementById('pos-tp').textContent    = '—';
    document.getElementById('pos-atr').textContent   = '—';
    document.getElementById('trail-label').textContent = 'Trail Stage: —';
    stageEl.textContent = '—';
    document.querySelectorAll('.trail-stage-pip').forEach(el => {
      el.className = 'trail-stage-pip';
    });
    return;
  }

  const isLong = p.is_long;
  card.className  = 'position-card ' + (isLong ? 'long' : 'short');
  badge.className = 'pos-badge ' + (isLong ? 'long' : 'short');
  badge.textContent = isLong ? '▲ LONG' : '▼ SHORT';

  document.getElementById('pos-entry').textContent = fmt(p.entry_price, 1);
  document.getElementById('pos-sl').textContent    = fmt(p.current_sl || p.sl, 1);
  document.getElementById('pos-tp').textContent    = fmt(p.tp, 1);
  document.getElementById('pos-atr').textContent   = fmt(p.atr, 1);

  const stage = p.trail_stage || 0;
  document.getElementById('trail-label').textContent = `Trail Stage: ${stage}/5`;
  stageEl.textContent = stage;

  document.querySelectorAll('.trail-stage-pip').forEach(el => {
    const s = parseInt(el.getAttribute('data-s'));
    el.className = 'trail-stage-pip ' + (s < stage ? 'done' : s === stage ? 'active' : '');
  });

  const diff = p.entry_price ? (Math.random() - 0.4) * 200 : 0;
  const upnl = (isLong ? diff : -diff) * 30;
  plEl.className = 'pos-pl ' + (upnl >= 0 ? 'positive' : 'negative');
  plEl.textContent = (upnl >= 0 ? '+' : '') + upnl.toFixed(2) + ' USDT';
}

function renderTable(trades) {
  const tbody = document.getElementById('trade-table-body');
  if (!trades || !trades.length) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No trades yet</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = [...trades].reverse().slice(0, 50).map((t, i) => {
    const win = t.real_pl > 0;
    const dir = t.is_long;
    // IST Update for the Trade History Table
    const ts  = new Date(t.ts).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle:'short', timeStyle:'short' });
    return `<tr>
      <td class="mono">${trades.length - i}</td>
      <td style="color:var(--text-2)">${ts}</td>
      <td>${t.signal_type}</td>
      <td class="${dir ? 'dir-long' : 'dir-short'}">${dir ? '▲ L' : '▼ S'}</td>
      <td class="mono">${fmt(t.entry_price,1)}</td>
      <td class="mono ${win ? 'win' : 'loss'}">${fmt(t.exit_price,1)}</td>
      <td class="mono" style="color:var(--accent-r)">${fmt(t.sl,1)}</td>
      <td class="mono" style="color:var(--accent-g)">${fmt(t.tp,1)}</td>
      <td class="mono">${t.trail_stage || 0}</td>
      <td style="color:var(--text-2)">${t.exit_reason}</td>
      <td class="mono ${win ? 'win' : 'loss'}">${t.real_pl > 0 ? '+' : ''}${fmt(t.real_pl)}</td>
    </tr>`;
  }).join('');
}

function renderStatus(st) {
  const badge = document.getElementById('bot-status');
  const text = document.getElementById('status-text');
  
  if (st && st.status === 'live') {
    badge.className = 'status-badge live';
    text.textContent = 'LIVE';
    badge.style = ''; 
  } else {
    badge.className = 'status-badge'; 
    badge.style.background = 'rgba(255,77,109,0.1)';
    badge.style.borderColor = 'rgba(255,77,109,0.3)';
    badge.style.color = 'var(--accent-r)';
    text.textContent = 'OFFLINE';
  }
}

/* ══════════════════════════════════════════════════════════════
   MAIN REFRESH LOOP
══════════════════════════════════════════════════════════════ */
async function refresh() {
  const data = await fetchData();
  renderStatus(data.bot_status);
  renderKPIs(data.summary);
  renderPosition(data.open_trade);
  renderTable(data.trades);
  _allTrades = data.trades || [];
  redrawCharts();
}

refresh();
setInterval(refresh, 5000);

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(redrawCharts, 150);
});
</script>
